<!DOCTYPE html>
<html>
<head>
  <title>London System - PawnTheory</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav>
  <h1>PawnTheory</h1>
</nav>

<div class="lesson">

  <h2>London System</h2>

  <h3>Core Setup</h3>
  <p>d4 → Nf3 → Bf4 → e3 → Bd3</p>

  <h3>Black Responses</h3>

  <button onclick="choose('A')">A) ...d5 setup</button>
  <button onclick="choose('B')">B) ...Nf6 flexible system</button>
  <button onclick="choose('C')">C) Early aggression</button>

  <p id="explanation"></p>

</div>

<script>
function choose(line) {
  const text = document.getElementById("explanation");

  if (line === "A") {
    text.innerText = "Solid center fight. You mirror structure and play slow chess.";
  }

  if (line === "B") {
    text.innerText = "Flexible development. Just keep your structure tight and don't panic.";
  }

  if (line === "C") {
    text.innerText = "If Black overextends early, you punish with simple development and center control.";
  }
}
</script>

</body>
</html>
