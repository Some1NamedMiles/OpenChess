<!DOCTYPE html>
<html>
<head>
  <title>Sicilian Defense - PawnTheory</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav>
  <h1>PawnTheory</h1>
</nav>

<div class="lesson">

  <h2>Sicilian Defense</h2>

  <h3>Main Idea</h3>
  <p>1.e4 c5 — asymmetrical fight for the center.</p>

  <h3>White Plans</h3>

  <button onclick="choose('A')">A) Open Sicilian (d4)</button>
  <button onclick="choose('B')">B) Closed Sicilian (Nc3)</button>
  <button onclick="choose('C')">C) Alapin (c3)</button>

  <p id="explanation"></p>

</div>

<script>
function choose(line) {
  const text = document.getElementById("explanation");

  if (line === "A") {
    text.innerText = "Open Sicilian: sharp, tactical, full of theory battles.";
  }

  if (line === "B") {
    text.innerText = "Closed Sicilian: slower buildup, kingside attacks.";
  }

  if (line === "C") {
    text.innerText = "Alapin: reduces theory, stabilizes the center early.";
  }
}
</script>

</body>
</html>
