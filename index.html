<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawntheory Interactive Trainer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root {
            --bg-color: #121824;
            --panel-color: #1e2640;
            --accent-green: #4ade80;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            max-width: 1100px;
            width: 100%;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #board {
            width: 500px;
            max-width: 100%;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .panel {
            flex: 1;
            min-width: 350px;
            max-width: 500px;
            background: var(--panel-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
        }
        .module-select {
            width: 100%;
            padding: 12px;
            background: #121824;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 1rem;
        }
        .prompt-box {
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--accent-blue);
            min-height: 120px;
            margin-bottom: 20px;
        }
        #status-message {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #hint-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }
        #btn-action {
            background: var(--accent-green);
            color: #121824;
        }
        #btn-action:hover { background: #3ec973; }
        #btn-hint {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        #btn-hint:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>

    <h1>♟️ Pawntheory Reps Trainer</h1>
    <p style="color: var(--text-muted); margin: 0;">Interactive, move-by-move training loops</p>

    <div class="container">
        <div id="board"></div>

        <div class="panel">
            <div>
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchPhase('openings')">Openings</button>
                    <button class="tab-btn" onclick="switchPhase('middlegames')">Middlegames</button>
                    <button class="tab-btn" onclick="switchPhase('endgames')">Endgames</button>
                </div>

                <select id="moduleDropdown" class="module-select" onchange="loadSelectedModule()"></select>

                <div class="prompt-box">
                    <div id="status-message">Loading Trainer...</div>
                    <div id="hint-text">Your turn. Find the best move.</div>
                </div>
            </div>

            <div class="controls">
                <button id="btn-hint" class="action-btn" onclick="showHint()">Reveal Solution</button>
                <button id="btn-action" class="action-btn" onclick="resetLine()">Restart Rep</button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
        // Core Database of Interactive Repetition Drills
        const dataset = {
            openings: [
                {
                    name: "Italian Game (Mainline)",
                    startFen: "r1bqkbnr/pppp1ppp/2n5/4p3/2B1P3/5N2/PPPP1PPP/RNBQK2R b KQkq - 3 3",
                    moves: ["Bc5", "c3", "Nf6", "d4", "exd4", "cxd4"],
                    hints: ["Black plays Bishop to c5", "White strikes with c3 to build a center", "Black counterattacks with Knight to f6", "White strikes immediately with d4!", "Black takes the pawn on d4", "White recaptures on d4, completing the ideal pawn pair."]
                },
                {
                    name: "Scholar's Mate Punishment",
                    startFen: "r1bqkbnr/pppp1ppp/2n5/4p2Q/2B1P3/8/PPPP1PPP/RNB1K1NR b KQkq - 3 3",
                    moves: ["g6", "Qf3", "Nf6"],
                    hints: ["Kick the Queen away using your g-pawn safely.", "White pulls back to f3 to renew the checkmate target.", "Develop your Knight to f6 to block the line of attack completely."]
                }
            ],
            middlegames: [
                {
                    name: "Greek Gift Sacrifice Attack",
                    startFen: "r1bqk2r/ppp2ppp/2n1pn2/3p4/3P4/2PBPN2/PP3PPP/RN1QK2R w KQkq - 0 1",
                    moves: ["Bxh7+", "Kxh7", "Ng5+"],
                    hints: ["Sacrifice the light-squared bishop directly on h7 to smash the protection.", "The enemy King accepts the sacrifice and steps up.", "Jump the Knight to g5 check to coordinate your charging Queen."]
                }
            ],
            endgames: [
                {
                    name: "Lucena Position (Building a Bridge)",
                    startFen: "1K6/3P4/8/8/8/6r1/1R6/k7 w - - 0 1",
                    moves: ["Rb4", "Rd3", "Kc7", "Rc3+", "Kb6"],
                    hints: ["Step 1 of the bridge: Plant your Rook onto the 4th rank.", "Black attacks your advanced pawn with the Rook.", "Step out with your King to build space.", "Black checks you from the side to harass your King.", "Step toward the rook, shielding yourself to lock down promotion."]
                }
            ]
        };

        let currentPhase = 'openings';
        let currentModuleIndex = 0;
        let currentMoveIndex = 0;
        let board = null;
        let game = new Chess();

        const statusMsg = document.getElementById("status-message");
        const hintTxt = document.getElementById("hint-text");

        function initTrainer() {
            switchPhase('openings');
        }

        function switchPhase(phase) {
            currentPhase = phase;
            currentModuleIndex = 0;
            
            // Highlight structural active tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Repopulate active dynamic dropdown
            const dropdown = document.getElementById("moduleDropdown");
            dropdown.innerHTML = "";
            dataset[phase].forEach((mod, index) => {
                let opt = document.createElement("option");
                opt.value = index;
                opt.innerText = mod.name;
                dropdown.appendChild(opt);
            });

            loadSelectedModule();
        }

        function loadSelectedModule() {
            currentModuleIndex = parseInt(document.getElementById("moduleDropdown").value) || 0;
            resetLine();
        }

        function resetLine() {
            const activeModule = dataset[currentPhase][currentModuleIndex];
            currentMoveIndex = 0;
            
            game.load(activeModule.startFen);
            
            if (board) board.destroy();
            
            board = Chessboard('board', {
                draggable: true,
                position: activeModule.startFen,
                onDragStart: onDragStart,
                onDrop: onDrop,
                snapbackSpeed: 500,
                snapSpeed: 100,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });

            statusMsg.innerText = "Find the correct rep!";
            statusMsg.style.color = "var(--text-light)";
            hintTxt.innerText = "Make the first move of the sequence.";
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;
            // Prevent dragging the wrong colored pieces depending on movement indices
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
        }

        function onDrop(source, target) {
            const activeModule = dataset[currentPhase][currentModuleIndex];
            const targetSan = activeModule.moves[currentMoveIndex];

            // Validate using background engine clone
            let moveObj = { from: source, to: target, promotion: 'q' };
            let testGame = new Chess(game.fen());
            let playedMove = testGame.move(moveObj);

            if (playedMove && playedMove.san === targetSan) {
                // Correct Move Played
                game.move(moveObj);
                currentMoveIndex++;
                
                statusMsg.innerText = "Correct Move!";
                statusMsg.style.color = "var(--accent-green)";
                
                if (currentMoveIndex >= activeModule.moves.length) {
                    hintTxt.innerText = "Module complete! You've successfully finished this rep.";
                    statusMsg.innerText = "Perfect Execution! 🎉";
                } else {
                    hintTxt.innerText = activeModule.hints[currentMoveIndex];
                    // Trigger automated engine response delay if multiple inputs remain
                    setTimeout(triggerAutoOpponentMove, 600);
                }
            } else {
                // Incorrect Move Blunder
                statusMsg.innerText = "Incorrect Rep. Try again!";
                statusMsg.style.color = "var(--accent-red)";
                return 'snapback';
            }
        }

        function triggerAutoOpponentMove() {
            const activeModule = dataset[currentPhase][currentModuleIndex];
            if (currentMoveIndex < activeModule.moves.length) {
                game.move(activeModule.moves[currentMoveIndex]);
                board.position(game.fen());
                currentMoveIndex++;
                
                if (currentMoveIndex < activeModule.moves.length) {
                    hintTxt.innerText = activeModule.hints[currentMoveIndex];
                    statusMsg.innerText = "Your Turn";
                    statusMsg.style.color = "var(--text-light)";
                } else {
                    hintTxt.innerText = "Module complete! You've successfully finished this rep.";
                    statusMsg.innerText = "Perfect Execution! 🎉";
                }
            }
        }

        function showHint() {
            const activeModule = dataset[currentPhase][currentModuleIndex];
            const nextCorrectMove = activeModule.moves[currentMoveIndex];
            hintTxt.innerText = `The winning move is: ${nextCorrectMove}. Context: ${activeModule.hints[currentMoveIndex]}`;
        }

        // Initialize App on load
        window.onload = initTrainer;
    </script>
</body>
</html>
