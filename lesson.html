<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawnTheory - Course Study</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1><a href="index.html">PawnTheory</a></h1>
        <div class="nav-right-actions">
            <button class="footer-btn-outline" id="navQuitBtn">✕ Close Course</button>
        </div>
    </header>

    <main class="lesson-workspace-wrapper">
        <section class="board-pane-left">
            <div id="chessrepsBoard" style="width: 100%;"></div>
        </section>

        <section class="interactive-panel-right">
            <div class="interactive-panel-header">
                📖 <strong>Learn</strong> • <span id="courseSubTitleHeader">Sicilian Defense</span>
            </div>

            <div class="coach-speech-row">
                <img src="https://chessboardjs.com/img/chesspieces/wikipedia/wP.png" class="pawn-avatar-icon" alt="Coach Icon">
                <div class="speech-bubble-white" id="coachSpeechBubbleBubble">
                    Let's explore this variation line move-by-move. Drag your piece to make the correct choice.
                </div>
            </div>

            <div class="action-footer-row">
                <button class="footer-btn-outline" id="hintActionBtn">💡 Hint</button>
                
                <div class="arrow-controls-box">
                    <button class="arrow-btn" id="prevLineStepBtn">〈</button>
                    <button class="arrow-btn" id="nextLineStepBtn">〉</button>
                </div>
            </div>
        </section>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js" crossorigin="anonymous"></script>
    
    <script src="js/openingsData.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
