<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawnTheory - Interactive Coach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1><a href="index.html">PawnTheory</a></h1>
    </header>

    <main class="lesson-container">
        <button class="back-btn" id="globalBackBtn">← Back to Dashboard</button>
        
        <div class="engine-workspace">
            <div class="board-wrapper">
                <div id="chessBoard" style="width: 100%; max-width: 400px; min-width: 280px; margin: 0 auto;"></div>
            </div>

            <div class="content-wrapper">
                <div class="moves-tracker" id="movesTracker">
                    </div>

                <div class="coach-container" id="coachBox">
                    <div class="coach-avatar" id="coachAvatar">🤖</div>
                    <div class="speech-bubble">
                        <h3 id="openingTitle">Opening Name</h3>
                        <p id="coachInstruction">Select a strategic roadmap variation below to start training!</p>
                        <div id="feedbackAlert" class="feedback-alert"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="actionArea">
            <h3 id="choicePromptHeader" style="margin-top: 1rem; margin-bottom: 0.5rem;">Select a variation path to test your skills:</h3>
            <section class="branches-container" id="branchesContainer">
                </section>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js" crossorigin="anonymous"></script>
    
    <script src="js/openingsData.js"></script>
    <script src="js/engine.js"></script>
</body>
</html>
